<!DOCTYPE html>
<html>
<head><title>Chat</title></head>
<body>
    <h1>Ask a Question</h1>
    <form method="post">
        Question: <input type="text" name="question" required><br>
        Provider: <select name="provider">
            <option value="ollama">Ollama</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
            <option value="deepseek">DeepSeek</option>
        </select><br>
        Model: <input type="text" name="model" value="llama3.1"><br>
        Top-K: <input type="number" name="top_k" value="5"><br>
        Temperature: <input type="number" step="0.1" name="temperature" value="0.2"><br>
        Mode: <select name="mode">
            <option value="strict">Strict RAG</option>
            <option value="assisted">Assisted RAG</option>
            <option value="open">Open Chat</option>
        </select><br>
        <button type="submit">Ask</button>
    </form>

    {% if answer %}
    <h2>Answer</h2>
    <p>{{ answer }}</p>
    <h3>Sources</h3>
    <ul>
        {% for src in sources %}
        <li>[{{ loop.index }}] {{ src.file }}, page {{ src.page }}, chunk {{ src.chunk }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <p><a href="/">Home</a></p>
</body>
</html>
