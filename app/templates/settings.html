<!DOCTYPE html>
<html>
<head><title>Settings</title></head>
<body>
    <h1>Edit Settings</h1>
    <form method="post">
        System Prompt:<br>
        <textarea name="system_prompt" rows="3" cols="80">{{ settings.system_prompt }}</textarea><br>
        RAG Prompt Template:<br>
        <textarea name="rag_prompt_template" rows="3" cols="80">{{ settings.rag_prompt_template }}</textarea><br>
        Context Template:<br>
        <input type="text" name="context_template" size="80" value="{{ settings.context_template }}"><br>
        Top-K: <input type="number" name="top_k" value="{{ settings.top_k }}"><br>
        Temperature: <input type="number" step="0.1" name="temperature" value="{{ settings.temperature }}"><br>
        Strict Grounding: <input type="checkbox" name="strict_grounding" {% if settings.strict_grounding %}checked{% endif %}><br>
        Default Provider: <input type="text" name="default_provider" value="{{ settings.default_provider }}"><br>
        Default Model: <input type="text" name="default_model" value="{{ settings.default_model }}"><br>
        Mode: <select name="mode">
            <option value="strict" {% if settings.mode == 'strict' %}selected{% endif %}>Strict</option>
            <option value="assisted" {% if settings.mode == 'assisted' %}selected{% endif %}>Assisted</option>
            <option value="open" {% if settings.mode == 'open' %}selected{% endif %}>Open</option>
        </select><br>
        <button type="submit">Save</button>
    </form>
    <p><a href="/">Home</a></p>
</body>
</html>
